<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">

  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

  <title>AR Back Camera</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: black;
    }

    a-scene {
      position: fixed;
      width: 100vw;
      height: 100vh;
      top: 0;
      left: 0;
    }
  </style>
</head>

<body>

<a-scene
  mindar-image="imageTargetSrc: target.mind; uiScanning: true; uiLoading: true; camera: {facingMode: environment};"
  embedded
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true">

  <!-- CAMERA -->
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- LIGHT -->
  <a-light type="ambient" intensity="1.5"></a-light>
  <a-light type="directional" intensity="1.2" position="0 2 1"></a-light>

  <!-- ASSETS -->
  <a-assets>
    <a-asset-item id="model" src="model.glb" crossorigin="anonymous"></a-asset-item>
  </a-assets>

  <!-- TARGET -->
  <a-entity mindar-image-target="targetIndex: 0">

    <a-gltf-model
      src="#model"
      position="0 0 0"
      rotation="0 0 0"
      scale="0.25 0.25 0.25"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 5000">
    </a-gltf-model>

  </a-entity>

</a-scene>

</body>
</html>
