<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black" />
<title>AR Console</title>

<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: #000;
    overflow: hidden;
    position: fixed;
    touch-action: none;
  }

  a-scene {
    width: 100vw;
    height: 100vh;
    position: fixed;
    top: 0;
    left: 0;
  }

  /* On masque toute UI par défaut de MindAR / A-Frame */
  .a-enter-vr,
  .a-orientation-modal,
  a-scene .mindar-ui-overlay {
    display: none !important;
  }
</style>
</head>

<body>

<a-scene
  mindar-image="imageTargetSrc: ./target.mind; autoStart: true; uiScanning: no; uiLoading: no; uiError: no; filterMinCF: 0.0001; filterBeta: 0.001;"
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true; antialias: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  embedded
>

  <a-assets>
    <a-asset-item id="model" src="./model.glb"></a-asset-item>
  </a-assets>

  <a-camera
    position="0 0 0"
    look-controls="enabled: false"
    cursor="fuse: false"
    raycaster="far: 10000; objects: .clickable"
  ></a-camera>

  <a-entity id="target" mindar-image-target="targetIndex: 0">
    <a-gltf-model
      id="object"
      src="#model"
      position="0 0 0"
      rotation="0 0 0"
      scale="0.3 0.3 0.3"
      animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear"
    ></a-gltf-model>
  </a-entity>

</a-scene>

</body>
</html>
