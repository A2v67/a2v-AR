<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="color-scheme" content="dark" />
<meta name="theme-color" content="#000000" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>AR</title>

<script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<script>
  /*
   * fit-to-marker
   * Scale le mesh une seule fois au chargement, sans toucher à la rotation.
   * La largeur (axe X) du modèle est calée sur "size" (qui correspond à la
   * largeur du marqueur AR, ~1 unité dans MindAR). La hauteur n'entre PAS
   * dans le calcul du scale : elle suit simplement le ratio du modèle une
   * fois la largeur fixée (scale uniforme).
   * Positionnement : centré en X et Z, mais calé par le BAS en Y (le bas du
   * modèle touche le centre du marqueur, au lieu d'être centré verticalement).
   */
  AFRAME.registerComponent('fit-to-marker', {
    schema: { size: { type: 'number', default: 0.85 } },
    init() {
      this._ready = false;
      this._retries = 0;
      this.el.addEventListener('model-loaded', () => {
        // On laisse passer une frame : au moment exact de "model-loaded",
        // le mesh n'est pas toujours totalement stable pour la mesure.
        requestAnimationFrame(() => this.fit());
      });
    },

    fit() {
      const mesh = this.el.getObject3D('mesh');
      if (!mesh) return;

      // IMPORTANT : reactive-model tourne en continu l'entity (this.el)
      // dès le init(), y compris avant que le modèle soit chargé (baseX:90
      // + inclinaison du téléphone). Si on mesure la bounding box pendant
      // que cette rotation est déjà appliquée, Box3.setFromObject() mélange
      // les axes X/Z selon l'angle du téléphone à cet instant précis : la
      // largeur mesurée devient incohérente (parfois beaucoup trop petite),
      // ce qui produit un facteur d'échelle énorme -> modèle géant.
      // On neutralise temporairement cette rotation pendant la mesure.
      const savedRotation = this.el.object3D.rotation.clone();
      this.el.object3D.rotation.set(0, 0, 0);
      this.el.object3D.updateMatrixWorld(true);

      // Reset scale avant mesure pour éviter toute accumulation
      mesh.scale.set(1, 1, 1);
      mesh.position.set(0, 0, 0);

      const box = new THREE.Box3().setFromObject(mesh);
      const sz  = new THREE.Vector3();
      const ctr = new THREE.Vector3();
      box.getSize(sz);
      box.getCenter(ctr);

      // On restaure la rotation dynamique (gérée par reactive-model)
      this.el.object3D.rotation.copy(savedRotation);

      // On ne se base QUE sur la largeur (X), pas sur maxDim(x,y,z)
      const width = sz.x;

      // Garde-fou : si la largeur mesurée est invalide ou anormalement
      // petite (mesh pas encore totalement prêt), on retente à la frame
      // suivante au lieu d'appliquer un scale absurde (modèle énorme).
      if (!width || !isFinite(width) || width < 1e-4) {
        if (this._retries < 60) { // ~1s à 60fps avant d'abandonner
          this._retries++;
          requestAnimationFrame(() => this.fit());
        }
        return;
      }

      const s = this.data.size / width;
      mesh.scale.set(s, s, s);
      // X et Z : centré. Y : le bas du modèle (box.min.y) est ramené à 0.
      mesh.position.set(-ctr.x * s, -box.min.y * s, -ctr.z * s);

      this._ready = true;
      // Signale à toggle-on-target que le fit est terminé : le modèle
      // ne sera révélé qu'à partir de cet événement, jamais avant.
      this.el.emit('model-fitted');
    }
  });

  /*
   * toggle-on-target
   * Cache le modèle tant que le marqueur n'est pas vu.
   * Gère aussi l'UI (viewfinder).
   */
  AFRAME.registerComponent('toggle-on-target', {
    init() {
      const model = this.el.querySelector('[gltf-model]');
      const ui    = document.getElementById('scan-ui');
      if (!model) return;

      model.object3D.visible = false;

      let targetVisible = false;
      let modelFitted   = false;
      let scanned       = false;

      const updateVisibility = () => {
        // Jamais visible tant que les DEUX conditions ne sont pas réunies :
        // marqueur détecté ET scale correctement calculé.
        model.object3D.visible = targetVisible && modelFitted;
      };

      model.addEventListener('model-fitted', () => {
        modelFitted = true;
        updateVisibility();
      });

      this.el.addEventListener('targetFound', () => {
        targetVisible = true;
        updateVisibility();
        if (!scanned) {
          scanned = true;
          ui.style.transition = 'opacity 0.4s ease';
          ui.style.opacity = '0';
          setTimeout(() => { ui.style.display = 'none'; }, 450);
        }
      });

      this.el.addEventListener('targetLost', () => {
        targetVisible = false;
        updateVisibility();
      });
    }
  });

  /*
   * reactive-model
   * Incline l'entity (pas le mesh) selon l'orientation de l'appareil.
   * La rotation de base (pour redresser le modèle) est définie ici,
   * séparée du scale géré par fit-to-marker.
   */
  AFRAME.registerComponent('reactive-model', {
    schema: {
      baseX:     { type: 'number', default: 0   },
      strength:  { type: 'number', default: 10  },
      smoothing: { type: 'number', default: 0.07 }
    },
    init() {
      this._rawGamma = 0;
      this._rawBeta  = 0;
      this._tiltX    = 0;
      this._tiltY    = 0;

      const onOrientation = (e) => {
        this._rawGamma = e.gamma || 0;
        this._rawBeta  = e.beta  || 0;
      };

      if (typeof DeviceOrientationEvent !== 'undefined' &&
          typeof DeviceOrientationEvent.requestPermission === 'function') {
        document.addEventListener('touchstart', () => {
          DeviceOrientationEvent.requestPermission()
            .then(r => { if (r === 'granted') window.addEventListener('deviceorientation', onOrientation, { passive: true }); })
            .catch(() => {});
        }, { once: true });
      } else {
        window.addEventListener('deviceorientation', onOrientation, { passive: true });
      }
    },

    tick() {
      const k  = this.data.smoothing;
      const st = this.data.strength;

      // Inclinaison relative à la position "téléphone tenu verticalement"
      const rawX = Math.max(-45, Math.min(45, this._rawBeta  - 90));
      const rawY = Math.max(-45, Math.min(45, this._rawGamma));

      const targetX = (rawX / 45) * st;
      const targetY = (rawY / 45) * st;

      this._tiltX += (targetX - this._tiltX) * k;
      this._tiltY += (targetY - this._tiltY) * k;

      this.el.object3D.rotation.set(
        THREE.MathUtils.degToRad(this.data.baseX + this._tiltX),
        THREE.MathUtils.degToRad(this._tiltY),
        0
      );
    }
  });
</script>

<style>
  *, *::before, *::after { box-sizing: border-box; }

  html, body {
    margin: 0; padding: 0;
    width: 100%; height: 100dvh;
    background: #000;
    overflow: hidden;
    position: fixed;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
    -webkit-touch-callout: none;
  }

  a-scene {
    width: 100vw; height: 100dvh;
    position: fixed; top: 0; left: 0;
  }

  .a-enter-vr, .a-orientation-modal, a-scene .mindar-ui-overlay {
    display: none !important;
  }

  #scan-ui {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: none;
    z-index: 10;
  }

  .viewfinder {
    width: min(240px, 62vw);
    aspect-ratio: 1;
    position: relative;
  }

  .viewfinder::before,
  .viewfinder::after,
  .viewfinder span::before,
  .viewfinder span::after {
    content: '';
    position: absolute;
    width: 24px; height: 24px;
    border-color: rgba(255,255,255,0.8);
    border-style: solid;
  }

  .viewfinder::before       { top: 0;    left: 0;   border-width: 2px 0 0 2px; border-radius: 3px 0 0 0; }
  .viewfinder::after        { top: 0;    right: 0;  border-width: 2px 2px 0 0; border-radius: 0 3px 0 0; }
  .viewfinder span::before  { bottom: 0; left: 0;   border-width: 0 0 2px 2px; border-radius: 0 0 0 3px; }
  .viewfinder span::after   { bottom: 0; right: 0;  border-width: 0 2px 2px 0; border-radius: 0 0 3px 0; }

  .scan-line {
    position: absolute;
    left: 6%; right: 6%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), transparent);
    animation: scanmove 2.2s ease-in-out infinite;
  }

  @keyframes scanmove {
    0%   { top: 8%;  opacity: 0; }
    10%  { opacity: 1; }
    90%  { opacity: 1; }
    100% { top: 88%; opacity: 0; }
  }
</style>
</head>

<body>

<div id="scan-ui">
  <div class="viewfinder">
    <span></span>
    <div class="scan-line"></div>
  </div>
</div>

<a-scene
  mindar-image="imageTargetSrc: ./target.mind; autoStart: true; maxTrack: 1; uiScanning: no; uiLoading: no; uiError: no; filterMinCF: 0.0001; filterBeta: 0.001; warmupTolerance: 2; missTolerance: 5;"
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true; antialias: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  embedded
>
  <a-assets>
    <a-asset-item id="model" src="./model.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-entity id="target" mindar-image-target="targetIndex: 0" toggle-on-target>
    <a-gltf-model
      id="object"
      src="#model"
      position="0 0 0"
      rotation="0 0 0"
      fit-to-marker="size: 0.85"
      reactive-model="baseX: 90; strength: 10; smoothing: 0.07"
    ></a-gltf-model>
  </a-entity>
</a-scene>

<script>
  document.querySelector('a-scene').addEventListener('arError', (e) => {
    console.error('[MindAR]', e.detail);
  });
  window.addEventListener('load', () => {
    const c = document.querySelector('canvas');
    if (c) c.addEventListener('webglcontextlost', (e) => { e.preventDefault(); });
  });
</script>

</body>
</html>
